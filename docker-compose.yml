services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: memory-card-backend
    volumes:
      - ./backend/data:/app/data
    environment:
      - PORT=3001
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: memory-card-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
